<section class="skills-section" id="skills">
    <p [animateOnScroll]="'anim-slide-down'" [animDelay]="0">MY SKILLS</p>
    <h1 [animateOnScroll]="'anim-fade-up'" [animDelay]="100">Technical Expertise</h1>
    <hr [animateOnScroll]="'anim-fade-up'" [animDelay]="150">

    <div class="skills-container">
        <div class="skill-category" *ngFor="let category of skills; let i = index"
             [animateOnScroll]="'anim-fade-up'" [animDelay]="i * 150">
            <h3>{{ category.category }}</h3>
            <div class="skill-items">
                <span class="skill-tag" *ngFor="let item of category.items; let j = index"
                      [animateOnScroll]="'anim-scale-in'" [animDelay]="(i * 150) + (j * 60)">{{ item }}</span>
            </div>
        </div>
    </div>
</section>

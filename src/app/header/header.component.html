<header class="header-list">
    <div class="div-list ">
        <!-- Hamburger Menu Button -->
        <button class="hamburger" [class.open]="isMenuOpen" (click)="toggleMenu()" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Overlay for mobile menu -->
        <div class="overlay" [class.active]="isMenuOpen" (click)="toggleMenu()"></div>


        <ul class="ul-list" [class.active]="isMenuOpen">
            <li class="active">
                <i class="fa-solid fa-home"></i>
                <a href="#home" (click)="scrollTo('home', $event); toggleMenu()">Home</a>
            </li>
            <li>
                <i class="fa-solid fa-address-card"></i>
                <a href="#about" (click)="scrollTo('about', $event); toggleMenu()">About</a>
            </li>
            <li>
                <i class="fa-solid fa-code"></i>
                <a href="#skills" (click)="scrollTo('skills', $event); toggleMenu()">Skills</a>
            </li>
            <li><a href="#project" class="nav-link" (click)="scrollTo('project', $event); toggleMenu()"><i
                        class="fa-solid fa-folder-open"></i> Projects</a></li>
            <li><a href="#world" class="nav-link" (click)="scrollTo('world', $event); toggleMenu()"><i
                        class="fa-solid fa-globe"></i> World</a></li>
            <li><a href="#achievements" class="nav-link" (click)="scrollTo('achievements', $event); toggleMenu()"><i
                        class="fa-solid fa-trophy"></i> Achievements</a></li>
            <li><a href="#contact" class="nav-link" (click)="scrollTo('contact', $event); toggleMenu()"><i
                        class="fa-solid fa-envelope"></i> Contact</a></li>
        </ul>

        <!-- Floating Music Toggle -->
        <div class="music-container" [class.playing]="isPlaying" [class.hidden]="!isMusicVisible">
            <span class="music-text">For a Peaceful Experience...</span>
            <button class="music-toggle" (click)="toggleMusic()" aria-label="Toggle background music">
                <!-- SVG Equalizer / Waveform Icon -->
                <svg class="equalizer-icon" [class.eq-playing]="isPlaying" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <rect class="bar bar-1" x="1" y="10" width="3" height="4" rx="1.5" />
                    <rect class="bar bar-2" x="6" y="6" width="3" height="12" rx="1.5" />
                    <rect class="bar bar-3" x="11" y="3" width="3" height="18" rx="1.5" />
                    <rect class="bar bar-4" x="16" y="6" width="3" height="12" rx="1.5" />
                    <rect class="bar bar-5" x="21" y="10" width="3" height="4" rx="1.5" />
                </svg>
            </button>
            <div class="music-notes" *ngIf="isPlaying">
                <i class="fa-solid fa-music note-1"></i>
                <i class="fa-solid fa-music note-2"></i>
                <i class="fa-solid fa-music note-3"></i>
            </div>
        </div>
    </div>
</header>

<!-- Global Background Music -->
<audio #bgMusic loop>
    <source src="assets/sundaribgm.mpeg" type="audio/mpeg">
</audio>

<div id="loading-screen" *ngIf="isLoading">
    <div class="scanline"></div>
    <div class="loading-content">

        <!-- Alert 1 -->
        <div class="alert-card" [class.visible]="showAlert1">
            <span class="alert-icon">⚠️</span>
            <div>
                <div class="alert-label">System Alert</div>
                <div class="alert-text">Enhanced Experience Available</div>
            </div>
        </div>

        <!-- Alert 2 -->
        <div class="alert-card headphones" [class.visible]="showAlert2">
            <span class="alert-icon">🎧</span>
            <div>
                <div class="alert-label">System Tip</div>
                <div class="alert-text">Headphones Recommended for the Best Experience</div>
            </div>
        </div>

        <!-- Alert 3 — Desktop Recommendation -->
        <div class="alert-card desktop" [class.visible]="showAlert3">
            <span class="alert-icon">🖥️</span>
            <div>
                <div class="alert-label">System Recommendation</div>
                <div class="alert-text">Use Desktop for the Best Experience</div>
            </div>
        </div>

        <!-- Alert 4 — Status -->
        <div class="alert-card status" [class.visible]="showAlert4">
            <span class="alert-icon">⚡</span>
            <div>
                <div class="alert-label">System Status</div>
                <div class="alert-text typing">Loading Interactive Interface...</div>
            </div>
        </div>

        <!-- Welcome Message -->
        <div class="welcome-msg" [class.visible]="showWelcome">
            <span class="alert-icon">💬</span>
            <div>
                <div class="alert-label">System Message</div>
                <div class="alert-text welcome-text">Welcome to My Portfolio</div>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-wrap" [class.visible]="showAlert1">
            <div class="progress-bar" [style.width.%]="progressWidth"></div>
        </div>

    </div>
</div>

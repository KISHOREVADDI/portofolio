<section class="home" id="home">
    <p class="home-p" [animateOnScroll]="'anim-slide-down'" [animDelay]="100">
        <span class="home-s"> </span>Available for freelance work
    </p>
    <div class="home-container">
        <div class="home-section">
            <div class="info-home">
                <h1 [animateOnScroll]="'anim-fade-left'" [animDelay]="150">Hi, I'm Kishore...!</h1>
                <h3 [animateOnScroll]="'anim-fade-left'" [animDelay]="250"><span class="typing-text"></span><span class="cursor">|</span></h3>
                <div class="info-p" [animateOnScroll]="'anim-fade-left'" [animDelay]="350">
                    <p>Proactive Computer Science student specializing in Cybersecurity, with </p>
                    <p>strong skills in secure backend development and Java Full Stack.</p>
                </div>
                <div class="info-p2" [animateOnScroll]="'anim-fade-up'" [animDelay]="400">
                    <p><i class="fa-solid fa-location-dot"></i> TadepalliGudem, India</p>
                    <p><i class="fa-solid fa-briefcase"></i> Available Now</p>
                </div>
                <div class="btnn" [animateOnScroll]="'anim-fade-up'" [animDelay]="500">
                    <button class="btn-home1" (click)="scrollTo('contact')"><i class="fa-solid fa-arrow-right"></i> Hire Me</button>
                    <div class="resume-button-group" [class.expanded]="isResumeExpanded">
                        <span class="resume-label" (click)="toggleResume()">
                            <i class="fa-regular fa-file-lines"></i> Resume 
                            <i class="fa-solid fa-chevron-right" 
                               [style.transform]="isResumeExpanded ? 'rotate(180deg)' : 'rotate(0)'" 
                               style="font-size: 12px; margin-left: 6px; transition: transform 0.3s ease;">
                            </i>
                        </span>
                        <div class="resume-actions" [class.show]="isResumeExpanded">
                            <a href="assets/kishore%20vaddi%20resume.pdf" target="_blank" class="resume-action"><i class="fa-solid fa-eye"></i> View</a>
                            <a href="assets/kishore%20vaddi%20resume.pdf" download="Kishore_Vaddi_Resume.pdf" class="resume-action"><i class="fa-solid fa-download"></i> Download</a>
                        </div>
                    </div>
                </div>
                <div class="hhr" [animateOnScroll]="'anim-fade-up'" [animDelay]="550">
                    <hr>
                </div>
                <div class="follow" [animateOnScroll]="'anim-bounce-up'" [animDelay]="650">
                    <p class="followw">Follow me:</p>
                    <ul>
                        <li><a href="https://github.com/KISHOREVADDI" target="_blank"><i
                                    class="fa-brands fa-github"></i></a></li>
                        <li><a href="https://www.linkedin.com/in/kishorevaddi" target="_blank"><i
                                    class="fa-brands fa-linkedin"></i></a></li>
                        <li><a href="https://x.com/kishore__pspk" target="_blank"><i
                                    class="fa-brands fa-x-twitter"></i></a></li>
                    </ul>
                </div>
            </div>
        </div>
        <img src="assets/images/img2.jpg" alt="" [animateOnScroll]="'anim-fade-right'" [animDelay]="300">
    </div>
</section>
